      {adding&&<TeamModal team={{name:"",adminEmail:"",agentCodes:[]}} agents={agents} onSave={save} onClose={()=>setAdding(false)} isNew/>}
      {editing&&<TeamModal team={editing} agents={agents} onSave={save} onClose={()=>setEditing(null)}/>}
    </div>
  );
}
function TeamModal({ team, agents, onSave, onClose, isNew }) {
  const [t,setT]=useState({...team,agentCodes:team.agentCodes||[]});
  function toggleAgent(code){ const has=t.agentCodes.includes(code); setT({...t,agentCodes:has?t.agentCodes.filter(c=>c!==code):[...t.agentCodes,code]}); }
  return (
    <div className="t-modal-bg">
      <div className="t-modal t-fade">
        <div className="t-modal-hd"><span>{isNew?"Add Team":"Edit Team"}</span><button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>
        <div className="t-modal-body" style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label className="t-label">Team Name</label><input className="t-input" value={t.name||""} onChange={e=>setT({...t,name:e.target.value})}/></div>
          <div><label className="t-label">Admin Email (optional)</label><input className="t-input" type="email" value={t.adminEmail||""} onChange={e=>setT({...t,adminEmail:e.target.value})}/></div>
          <div>
            <label className="t-label">Agents This Team May Run</label>
            <div style={{border:"1.5px solid var(--black)",maxHeight:200,overflowY:"auto"}}>
              {agents.map(a=>(
                <label key={a.agentCode} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #f0f0f0",cursor:"pointer",fontSize:12}}>
                  <input type="checkbox" style={{width:"auto"}} checked={t.agentCodes.includes(a.agentCode)} onChange={()=>toggleAgent(a.agentCode)}/>
                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12}}>{a.displayName}</div><div style={{fontSize:9,color:"var(--muted)",fontFamily:"var(--fm)"}}>{a.agentCode} · {a.active?"active":"inactive"}</div></div>
                </label>
              ))}
            </div>
          </div>
        </div>
        <div className="t-modal-footer"><button onClick={onClose} className="t-btn t-btn-outline">Cancel</button><button onClick={()=>onSave(t)} className="t-btn t-btn-black">Save</button></div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// USAGE VIEW — enhanced with team/user stats including QL, connected, lineup, CV awaited, empty status
// ─────────────────────────────────────────────────────────────
function UsageView() {
  const [data,setData]=useState(null); const [range,setRange]=useState("7d");
  const [viewMode,setViewMode]=useState("team");
  const [userFilter,setUserFilter]=useState("");

  useEffect(()=>{ setData(null); (async()=>{ const r=await api("getUsage",{range}); if(r.ok)setData(r); })(); },[range]);

  if(!data) return <div style={{padding:60,textAlign:"center"}}><Spin/></div>;

  // Chart data
  const byDay={};
  (data.rows||[]).forEach(r=>{byDay[r.day]=(byDay[r.day]||0)+Number(r.minutes||0);});
  const chartData=Object.keys(byDay).sort().map(d=>({day:d,minutes:Math.round(byDay[d]*10)/10}));

  // Team grouping with extended stats from leadStats
  const byTeam={};
  (data.rows||[]).forEach(r=>{
    const t=r.team||"No Team";
    if(!byTeam[t]) byTeam[t]={name:t,totalMins:0,totalCalls:0,rows:[],ql:0,connected:0,lineup:0,cvAwaited:0,emptyStatus:0};
    byTeam[t].totalMins=Math.round((byTeam[t].totalMins+Number(r.minutes||0))*10)/10;
    byTeam[t].totalCalls+=Number(r.calls||0);
    byTeam[t].rows.push(r);
  });

  // Aggregate lead stats per team
  (data.leadStats||[]).forEach(ls=>{
    const t=ls.team||"No Team";
    if(byTeam[t]){
      byTeam[t].ql += ls.totalLeads||0;
      byTeam[t].connected += ls.connected||0;
      byTeam[t].lineup += ls.interviewLinedUp||0;
      byTeam[t].cvAwaited += ls.cvAwaited||0;
      byTeam[t].emptyStatus += ls.emptyCallStatus||0;
    }
  });

  const teamList=Object.values(byTeam).sort((a,b)=>b.totalMins-a.totalMins);

  // Per-user aggregation with extended stats
  const byUser = {};
  (data.rows||[]).forEach(r=>{
    const key = r.email || r.name;
    if(!byUser[key]) byUser[key]={name:r.name,email:r.email,team:r.team,dailyLimit:r.dailyLimit,totalMins:0,totalCalls:0,days:0,ql:0,connected:0,lineup:0,cvAwaited:0,emptyStatus:0};
    byUser[key].totalMins=Math.round((byUser[key].totalMins+Number(r.minutes||0))*10)/10;
    byUser[key].totalCalls+=Number(r.calls||0);
    byUser[key].days+=1;
  });

  // Merge leadStats into user
  (data.leadStats||[]).forEach(ls=>{
    const key = ls.email;
    if(byUser[key]){
      byUser[key].ql = ls.totalLeads||0;
      byUser[key].connected = ls.connected||0;
      byUser[key].lineup = ls.interviewLinedUp||0;
      byUser[key].cvAwaited = ls.cvAwaited||0;
      byUser[key].emptyStatus = ls.emptyCallStatus||0;
    }
  });

  const userList = Object.values(byUser).sort((a,b)=>b.totalMins-a.totalMins);
  const userOptions = userList.map(u=>({label:u.name||u.email, value:u.email}));

  const filteredRows = userFilter
    ? (data.rows||[]).filter(r=>r.email===userFilter||r.name===userFilter)
    : (data.rows||[]);

  const grandTotalMins = (data.rows||[]).reduce((s,r)=>s+Number(r.minutes||0),0);
  const grandTotalCalls = (data.rows||[]).reduce((s,r)=>s+Number(r.calls||0),0);
  const grandQL = (data.leadStats||[]).reduce((s,ls)=>s+(ls.totalLeads||0),0);
  const grandConnected = (data.leadStats||[]).reduce((s,ls)=>s+(ls.connected||0),0);
  const grandLineup = (data.leadStats||[]).reduce((s,ls)=>s+(ls.interviewLinedUp||0),0);

  return (
    <div className="t-fade">
      <div className="t-mast">
        <div><div className="t-mast-title">Usage</div><div className="t-mast-sub">Call minute consumption by team &amp; user</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",border:"1.5px solid rgba(255,255,255,.3)",borderRadius:3,overflow:"hidden"}}>
            <button onClick={()=>setViewMode("team")} style={{padding:"5px 12px",fontSize:10,fontFamily:"var(--fd)",fontWeight:700,letterSpacing:".08em",border:"none",cursor:"pointer",background:viewMode==="team"?"#fff":"transparent",color:viewMode==="team"?"var(--black)":"rgba(255,255,255,.7)"}}>By Team</button>
            <button onClick={()=>setViewMode("user")} style={{padding:"5px 12px",fontSize:10,fontFamily:"var(--fd)",fontWeight:700,letterSpacing:".08em",border:"none",borderLeft:"1px solid rgba(255,255,255,.3)",cursor:"pointer",background:viewMode==="user"?"#fff":"transparent",color:viewMode==="user"?"var(--black)":"rgba(255,255,255,.7)"}}>By User</button>
          </div>
          <select className="mast-select" value={range} onChange={e=>setRange(e.target.value)}>
            <option value="today">Today</option><option value="7d">Last 7 days</option><option value="30d">Last 30 days</option>
          </select>
        </div>
      </div>

      {/* Grand totals */}
      <div className="t-kpis" style={{gridTemplateColumns:"repeat(6,1fr)"}}>
        {[
          {label:"Total Minutes",value:Math.round(grandTotalMins*10)/10,color:"#ffc600"},
          {label:"Total Calls",value:grandTotalCalls,color:"#0066b3"},
          {label:"Active Users",value:userList.length,color:"#009149"},
          {label:"Total QL",value:grandQL,color:"#009149"},
          {label:"Connected",value:grandConnected,color:"#0369a1"},
          {label:"Lined Up",value:grandLineup,color:"#5b21b6"},
        ].map(k=>(
          <div key={k.label} className="t-kpi">
            <div className="t-kpi-accent" style={{background:k.color}}/>
            <div className="t-kpi-label">{k.label}</div>
            <div className="t-kpi-value">{k.value}</div>
          </div>
        ))}
      </div>

      {chartData.length>0 && RECHARTS_OK && (
        <div className="t-board">
          <div className="t-board-hd"><h2 className="t-board-hd-title">Minutes Per Day</h2></div>
          <div style={{padding:"14px 18px"}}>
            <R.ResponsiveContainer width="100%" height={180}>
              <R.BarChart data={chartData}>
                <R.CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                <R.XAxis dataKey="day" fontSize={10} tick={{fill:"#888",fontFamily:"var(--fm)"}}/>
                <R.YAxis fontSize={10} tick={{fill:"#888",fontFamily:"var(--fm)"}}/>
                <R.Tooltip contentStyle={{border:"1.5px solid #0a0a0a",borderRadius:0,fontSize:11}}/>
                <R.Bar dataKey="minutes" fill="#0a0a0a" radius={[2,2,0,0]}/>
              </R.BarChart>
            </R.ResponsiveContainer>
          </div>
        </div>
      )}

      {viewMode==="team" ? (
        <div className="t-board">
          <div className="t-board-hd"><h2 className="t-board-hd-title">By Team</h2><span className="t-board-meta">{teamList.length} teams</span></div>
          {teamList.map(team=>(
            <div key={team.name} className="usage-team-card">
              <div className="usage-team-card-hd">
                <span>{team.name}</span>
                <span className="usage-team-stat">{team.totalCalls} calls</span>
                <span className="usage-team-stat">{team.totalMins} min</span>
              </div>
              {/* Team KPI chips */}
              <div style={{padding:"10px 16px",display:"flex",gap:8,flexWrap:"wrap",borderBottom:"1px solid var(--border)"}}>
                <span className="usage-stat-chip blue"><b>{team.totalCalls}</b><span>calls</span></span>
                <span className="usage-stat-chip yellow"><b>{team.totalMins}</b><span>min</span></span>
                <span className="usage-stat-chip green"><b>{team.ql}</b><span>QL</span></span>
                <span className="usage-stat-chip blue"><b>{team.connected}</b><span>connected</span></span>
                <span className="usage-stat-chip purple"><b>{team.lineup}</b><span>lined up</span></span>
                <span className="usage-stat-chip yellow"><b>{team.cvAwaited}</b><span>CV awaited</span></span>
                {team.emptyStatus>0 && <span className="usage-stat-chip red"><b>{team.emptyStatus}</b><span>empty status</span></span>}
              </div>
              <div className="t-tbl-wrap">
                <table className="t-tbl">
                  <thead><tr><th>Day</th><th>User</th><th>Calls</th><th>Minutes</th><th>Daily Limit</th><th>Usage</th></tr></thead>
                  <tbody>
                    {team.rows.map((r,i)=>{
                      const pct = r.dailyLimit>0 ? Math.min(100,Math.round((Number(r.minutes)/r.dailyLimit)*100)) : 0;
                      return (
                        <tr key={i}>
                          <td><span className="t-mono" style={{fontSize:10}}>{r.day}</span></td>
                          <td><div className="t-tbl nm">{r.name}</div><div className="t-tbl nm-sub">{r.email}</div></td>
                          <td className="t-mono">{r.calls}</td>
                          <td className="t-mono">{r.minutes}</td>
                          <td className="t-mono">{r.dailyLimit}</td>
                          <td style={{minWidth:80}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div className="t-bar" style={{flex:1,height:5,borderRadius:3}}>
                                <div style={{width:pct+"%",borderRadius:3,height:"100%",background:pct>=90?"var(--red)":pct>=60?"var(--yellow)":"var(--green)"}}/>
                              </div>
                              <span style={{fontSize:9,fontFamily:"var(--fm)",color:"var(--muted)",minWidth:26}}>{pct}%</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="t-board">
          <div className="t-board-hd">
            <h2 className="t-board-hd-title">Per User</h2>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <select className="t-select" value={userFilter} onChange={e=>setUserFilter(e.target.value)} style={{fontSize:11,minWidth:180}}>
                <option value="">All users</option>
                {userOptions.map(u=><option key={u.value} value={u.value}>{u.label}</option>)}
              </select>
              {userFilter && <button className="t-btn t-btn-sm t-btn-outline" onClick={()=>setUserFilter("")}>Clear ×</button>}
              <span className="t-board-meta">{userFilter ? "1 user" : `${userList.length} users`}</span>
            </div>
          </div>

          {/* Per-user summary cards with extended stats */}
          {!userFilter && (
            <div style={{padding:"12px 16px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10,borderBottom:"1px solid var(--border)"}}>
              {userList.map(u=>{
                const avgMins = u.days>0 ? Math.round((u.totalMins/u.days)*10)/10 : 0;
                const limitPct = u.dailyLimit>0 ? Math.min(100,Math.round((avgMins/u.dailyLimit)*100)) : 0;
                return (
                  <div key={u.email} className="usage-user-card" onClick={()=>setUserFilter(u.email)}>
                    <div className="usage-user-hd">
                      <Disc name={u.name||u.email}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="usage-user-name">{u.name||u.email}</div>
                        <div className="usage-user-email">{u.email} · {u.team||"No team"}</div>
                      </div>
                    </div>
                    {/* Stats chips */}
                    <div style={{padding:"8px 14px",display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span className="usage-stat-chip blue"><b>{u.totalCalls}</b><span>calls</span></span>
                      <span className="usage-stat-chip yellow"><b>{u.totalMins}</b><span>min</span></span>
                      <span className="usage-stat-chip green"><b>{u.ql}</b><span>QL</span></span>
                      <span className="usage-stat-chip blue"><b>{u.connected}</b><span>conn</span></span>
                      <span className="usage-stat-chip purple"><b>{u.lineup}</b><span>lineup</span></span>
                      <span className="usage-stat-chip yellow"><b>{u.cvAwaited}</b><span>CV</span></span>
                      {u.emptyStatus>0 && <span className="usage-stat-chip red"><b>{u.emptyStatus}</b><span>empty</span></span>}
                    </div>
                    {u.dailyLimit>0 && (
                      <div style={{padding:"0 14px 10px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--muted)",fontFamily:"var(--fm)",marginBottom:3}}>
                          <span>Avg vs limit ({u.dailyLimit}m)</span>
                          <span style={{color:limitPct>=90?"var(--red)":limitPct>=60?"var(--yellow)":"var(--green)",fontWeight:700}}>{limitPct}%</span>
                        </div>
                        <div className="t-bar" style={{height:5,borderRadius:3}}>
                          <div style={{width:limitPct+"%",height:"100%",borderRadius:3,background:limitPct>=90?"var(--red)":limitPct>=60?"var(--yellow)":"var(--green)"}}/>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Detailed rows table */}
          <div className="t-tbl-wrap">
            <table className="t-tbl">
              <thead><tr><th>Day</th><th>User</th><th>Team</th><th>Calls</th><th>Minutes</th><th>QL</th><th>Connected</th><th>Lined Up</th><th>CV Awaited</th><th style={{color:"var(--red)"}}>Empty Status</th><th>Limit</th><th>Usage %</th></tr></thead>
              <tbody>
                {filteredRows.map((r,i)=>{
                  const pct = r.dailyLimit>0 ? Math.min(100,Math.round((Number(r.minutes)/r.dailyLimit)*100)) : 0;
                  // find lead stats for this user
                  const ls = (data.leadStats||[]).find(x=>x.email===r.email)||{};
                  return (
                    <tr key={i}>
                      <td><span className="t-mono" style={{fontSize:10}}>{r.day}</span></td>
                      <td><div className="t-tbl nm">{r.name}</div><div className="t-tbl nm-sub">{r.email}</div></td>
                      <td style={{fontSize:11}}>{r.team||"—"}</td>
                      <td className="t-mono">{r.calls}</td>
                      <td className="t-mono">{r.minutes}</td>
                      <td><span className="usage-stat-chip green" style={{fontSize:10}}><b>{ls.totalLeads||0}</b></span></td>
                      <td><span className="usage-stat-chip blue" style={{fontSize:10}}><b>{ls.connected||0}</b></span></td>
                      <td><span className="usage-stat-chip purple" style={{fontSize:10}}><b>{ls.interviewLinedUp||0}</b></span></td>
                      <td><span className="usage-stat-chip yellow" style={{fontSize:10}}><b>{ls.cvAwaited||0}</b></span></td>
                      <td>{(ls.emptyCallStatus||0)>0 ? <span className="usage-stat-chip red" style={{fontSize:10}}><b>{ls.emptyCallStatus}</b></span> : <span style={{color:"var(--green)",fontSize:11}}>✓</span>}</td>
                      <td className="t-mono">{r.dailyLimit}</td>
                      <td style={{minWidth:90}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div className="t-bar" style={{flex:1,height:5,borderRadius:3}}>
                            <div style={{width:pct+"%",height:"100%",borderRadius:3,background:pct>=90?"var(--red)":pct>=60?"var(--yellow)":"var(--green)"}}/>
                          </div>
                          <span style={{fontSize:9,fontFamily:"var(--fm)",color:pct>=90?"var(--red)":pct>=60?"#854d0e":"var(--green)",fontWeight:700,minWidth:26}}>{pct}%</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {filteredRows.length===0 && <tr><td colSpan={12} style={{textAlign:"center",color:"var(--muted)",padding:32,fontFamily:"var(--fd)",fontWeight:700}}>No usage data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState("dashboard");
  const [user,setUser]=useState(null);
  const [today,setToday]=useState(null);
  const [teams,setTeams]=useState([]);
  const [users,setUsers]=useState([]);
  const [agents,setAgents]=useState([]);
  const [selAgent,setSelAgent]=useState("");
  const [showChangePw,setShowChangePw]=useState(false);
  const [bootScreen,setBootScreen]=useState("boot");
  const [setupToken,setSetupToken]=useState("");
  const [leadsFilter,setLeadsFilter]=useState(null);

  async function refreshMe(){ const r=await api("me",{}); if(r.ok){setUser(r.user);setToday(r.today);setAgents(r.agents||[]);} }
  async function refreshTeams(){ const r=await api("listTeams",{}); if(r.ok)setTeams(r.teams||[]); }
  async function refreshUsers(){ if(user&&user.role!=="recruiter"){const r=await api("listUsers",{});if(r.ok)setUsers(r.users||[]);} }

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const t=params.get("token");
    if(t){setSetupToken(t);setBootScreen("setup");return;}
    const s=localStorage.getItem("session");
    if(!s){setBootScreen("login");return;}
    (async()=>{
      const r=await api("me",{});
      if(r.ok){setUser(r.user);setToday(r.today);setAgents(r.agents||[]);setBootScreen("app");}
      else{localStorage.removeItem("session");setBootScreen("login");}
    })();
  },[]);

  useEffect(()=>{if(bootScreen==="app"){refreshTeams();refreshUsers();}},[bootScreen]);

  async function onLogout(){ await api("logout",{}); localStorage.removeItem("session"); window.location.search=""; }
  function onViewLeads(agentCode, requestId) { setLeadsFilter({agentCode, requestId}); setView("leads"); }

  if(bootScreen==="boot") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spin/></div>;
  if(bootScreen==="login") return <LoginScreen onLoggedIn={u=>{setUser(u);setBootScreen("app");refreshMe();}} goForgot={()=>setBootScreen("forgot")}/>;
  if(bootScreen==="forgot") return <ForgotScreen goLogin={()=>setBootScreen("login")}/>;
  if(bootScreen==="setup") return <SetupScreen token={setupToken} goLogin={()=>{setBootScreen("login");window.history.replaceState({},"",window.location.pathname);}} onCompleted={u=>{setUser(u);setBootScreen("app");window.history.replaceState({},"",window.location.pathname);refreshMe();}}/>;

  let content=null;
  if(view==="dashboard") content=<DashboardView user={user} agents={agents} selectedAgent={selAgent} setSelectedAgent={setSelAgent}/>;
  else if(view==="leads") content=<LeadsView user={user} users={users} agents={agents} teams={teams} initialFilter={leadsFilter} onClearFilter={()=>setLeadsFilter(null)}/>;
  else if(view==="trigger") content=<UploadView user={user} agents={agents} refreshMe={refreshMe}/>;
  else if(view==="campaigns") content=<CampaignsView agents={agents} user={user} teams={teams} onViewLeads={onViewLeads}/>;
  else if(view==="agents") content=<AgentsView onChange={setAgents}/>;
  else if(view==="users") content=<UsersView user={user} teams={teams}/>;
  else if(view==="teams") content=<TeamsView user={user} agents={agents}/>;
  else if(view==="usage") content=<UsageView/>;

  return (
    <>
      <Shell user={user} today={today} onLogout={onLogout} view={view} setView={v=>{setView(v);if(v!=="leads")setLeadsFilter(null);}} onChangePw={()=>setShowChangePw(true)}>
        {content}
      </Shell>
      {showChangePw && <ChangePasswordModal onClose={()=>setShowChangePw(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
